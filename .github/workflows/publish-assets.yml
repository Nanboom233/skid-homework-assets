name: Publish scanner assets

on:
  workflow_dispatch:
    inputs:
      asset_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        default: "v0.1.0"
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        type: boolean
        default: false
      camera_source_ref:
        description: "skid-homework ref used to build camera-server.jar"
        required: true
        default: "main"

permissions:
  contents: write

run-name: Publish scanner assets ${{ inputs.asset_tag }}

jobs:
  publish:
    name: Build and publish platform packages
    runs-on: ubuntu-latest
    env:
      ASSET_TAG: ${{ inputs.asset_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Checkout app repository
        uses: actions/checkout@v6.0.3
        with:
          repository: Nanboom233/skid-homework
          ref: ${{ inputs.camera_source_ref }}
          path: app-source

      - name: Install Python dependencies
        shell: bash
        run: python -m pip install --upgrade pip -r requirements.txt

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build packages
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/build_assets.py \
            --asset-tag "${ASSET_TAG}" \
            --source-manifest asset-sources.json \
            --work-dir work \
            --dist-dir dist

      - name: Build camera server
        shell: bash
        run: |
          set -euo pipefail
          gradle -p app-source/server assembleRelease
          cp app-source/server/build/outputs/apk/release/camera-server.jar \
            "dist/camera-server-${ASSET_TAG}.jar"
          sha256sum "dist/camera-server-${ASSET_TAG}.jar" \
            > "dist/camera-server-${ASSET_TAG}.jar.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ inputs.asset_tag }}
          name: ${{ inputs.asset_tag }}
          prerelease: ${{ inputs.prerelease }}
          overwrite_files: true
          files: |
            dist/windows-directml-${{ inputs.asset_tag }}.zip
            dist/windows-directml-${{ inputs.asset_tag }}.zip.sha256
            dist/linux-tensorrt-cuda-${{ inputs.asset_tag }}.tar.gz
            dist/linux-tensorrt-cuda-${{ inputs.asset_tag }}.tar.gz.sha256
            dist/camera-server-${{ inputs.asset_tag }}.jar
            dist/camera-server-${{ inputs.asset_tag }}.jar.sha256
