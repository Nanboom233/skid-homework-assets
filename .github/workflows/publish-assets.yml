name: Publish scanner assets

on:
  workflow_dispatch:
    inputs:
      asset_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        default: "v0.1.0"
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

run-name: Publish scanner assets ${{ inputs.asset_tag }}

jobs:
  publish:
    name: Build and publish platform packages
    runs-on: ubuntu-latest
    env:
      ASSET_TAG: ${{ inputs.asset_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Install Python dependencies
        shell: bash
        run: python -m pip install --upgrade pip -r requirements.txt

      - name: Build packages
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/build_assets.py \
            --asset-tag "${ASSET_TAG}" \
            --source-manifest asset-sources.json \
            --work-dir work \
            --dist-dir dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ inputs.asset_tag }}
          name: Scanner assets ${{ inputs.asset_tag }}
          prerelease: ${{ inputs.prerelease }}
          overwrite_files: true
          files: |
            dist/windows-directml-${{ inputs.asset_tag }}.zip
            dist/linux-tensorrt-cuda-${{ inputs.asset_tag }}.tar.gz
