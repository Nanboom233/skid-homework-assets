name: Publish scanner assets

on:
  workflow_dispatch:
    inputs:
      asset_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        default: "v0.1.0"
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

run-name: Publish scanner assets ${{ inputs.asset_tag }}

jobs:
  publish:
    name: Build and publish platform packages
    runs-on: ubuntu-latest
    env:
      ASSET_TAG: ${{ inputs.asset_tag }}
      DOCALIGNER_MODEL_ID: 14vUH77v6yGg7zFctUgcT6BzV5Iisg4Dl
      DOCALIGNER_MODEL_URL: https://drive.google.com/uc?id=14vUH77v6yGg7zFctUgcT6BzV5Iisg4Dl
      DOCALIGNER_LICENSE_URL: https://raw.githubusercontent.com/DocsaidLab/DocAligner/main/LICENSE
      UV_DOC_CHECKPOINT_URL: https://github.com/tanguymagne/UVDoc/raw/main/model/best_model.pkl
      UV_DOC_MODEL_PY_URL: https://raw.githubusercontent.com/tanguymagne/UVDoc/main/model.py
      UV_DOC_LICENSE_URL: https://raw.githubusercontent.com/tanguymagne/UVDoc/main/LICENSE
      UV_DOC_README_URL: https://raw.githubusercontent.com/tanguymagne/UVDoc/main/README.md
      ORT_DML_NUPKG_URL: https://api.nuget.org/v3-flatcontainer/microsoft.ml.onnxruntime.directml/1.24.4/microsoft.ml.onnxruntime.directml.1.24.4.nupkg
      DIRECTML_NUPKG_URL: https://api.nuget.org/v3-flatcontainer/microsoft.ai.directml/1.15.4/microsoft.ai.directml.1.15.4.nupkg
      LINUX_ORT_URL: https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-x64-gpu-1.24.4.tgz
      LINUX_ORT_SHA256: c5f804ff5d239b436fa59e9f2fb288a39f7eb9552f6a636c8b71e792e91a8808

    steps:
      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install gdown onnx
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build packages
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          import shutil
          import subprocess
          import sys
          import tarfile
          import zipfile
          from pathlib import Path
          from urllib.request import urlretrieve

          ASSET_TAG = os.environ["ASSET_TAG"]
          DOCALIGNER_MODEL_ID = os.environ["DOCALIGNER_MODEL_ID"]
          DOCALIGNER_MODEL_URL = os.environ["DOCALIGNER_MODEL_URL"]
          DOCALIGNER_LICENSE_URL = os.environ["DOCALIGNER_LICENSE_URL"]
          UV_DOC_CHECKPOINT_URL = os.environ["UV_DOC_CHECKPOINT_URL"]
          UV_DOC_MODEL_PY_URL = os.environ["UV_DOC_MODEL_PY_URL"]
          UV_DOC_LICENSE_URL = os.environ["UV_DOC_LICENSE_URL"]
          UV_DOC_README_URL = os.environ["UV_DOC_README_URL"]
          ORT_DML_NUPKG_URL = os.environ["ORT_DML_NUPKG_URL"]
          DIRECTML_NUPKG_URL = os.environ["DIRECTML_NUPKG_URL"]
          LINUX_ORT_URL = os.environ["LINUX_ORT_URL"]
          LINUX_ORT_SHA256 = os.environ["LINUX_ORT_SHA256"]

          ROOT = Path.cwd()
          WORK = ROOT / "work"
          COMMON = WORK / "common"
          UPSTREAM = WORK / "upstream"
          DIST = ROOT / "dist"

          def reset_dir(path: Path) -> None:
              if path.exists():
                  shutil.rmtree(path)
              path.mkdir(parents=True, exist_ok=True)

          def download(url: str, path: Path) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              urlretrieve(url, path)

          def sha256_file(path: Path) -> str:
              digest = hashlib.sha256()
              with path.open("rb") as fh:
                  for chunk in iter(lambda: fh.read(1024 * 1024), b""):
                      digest.update(chunk)
              return digest.hexdigest()

          def write_text(path: Path, text: str) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(text, encoding="utf-8", newline="\n")

          def zip_member(zf: zipfile.ZipFile, requested: str) -> str:
              requested_lower = requested.lower()
              for name in zf.namelist():
                  if name.lower() == requested_lower:
                      return name
              raise RuntimeError(f"Missing expected zip member: {requested}")

          def copy_zip_member(
              archive: Path,
              requested: str,
              destination: Path,
              required: bool = True,
          ) -> bool:
              with zipfile.ZipFile(archive) as zf:
                  try:
                      member = zip_member(zf, requested)
                  except RuntimeError:
                      if required:
                          raise
                      return False
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  destination.write_bytes(zf.read(member))
                  return True

          def find_extracted_path(root: Path, suffix: str) -> Path:
              suffix = suffix.replace("\\", "/")
              for path in root.rglob("*"):
                  if path.as_posix().endswith(suffix) and path.is_file():
                      return path
              raise RuntimeError(f"Missing expected extracted file: {suffix}")

          def copy_extracted_path(root: Path, suffix: str, destination: Path) -> None:
              source = find_extracted_path(root, suffix)
              destination.parent.mkdir(parents=True, exist_ok=True)
              shutil.copyfile(source, destination, follow_symlinks=True)

          def copy_optional_extracted_path(
              root: Path,
              suffix: str,
              destination: Path,
          ) -> bool:
              try:
                  copy_extracted_path(root, suffix, destination)
                  return True
              except RuntimeError:
                  return False

          def source_url_for(path: str) -> str:
              fixed = {
                  "models/docaligner-fastvit_sa24.onnx": DOCALIGNER_MODEL_URL,
                  "models/uvdoc-best-model.onnx": UV_DOC_CHECKPOINT_URL,
                  "models/LICENSE-docaligner": DOCALIGNER_LICENSE_URL,
                  "models/LICENSE-uvdoc": UV_DOC_LICENSE_URL,
                  "models/README.md": UV_DOC_README_URL,
              }
              if path in fixed:
                  return fixed[path]
              if path.startswith("onnxruntime/windows/DirectML"):
                  return DIRECTML_NUPKG_URL
              if path.startswith("onnxruntime/windows/"):
                  return ORT_DML_NUPKG_URL
              if path.startswith("onnxruntime/linux/"):
                  return LINUX_ORT_URL
              raise RuntimeError(f"No sourceUrl mapping for {path}")

          def write_manifest(package_root: Path, platform_target: str) -> None:
              entries = []
              for path in sorted(package_root.rglob("*")):
                  if not path.is_file() or path.name == "manifest.json":
                      continue
                  relative_path = path.relative_to(package_root).as_posix()
                  entries.append(
                      {
                          "path": relative_path,
                          "size": path.stat().st_size,
                          "sha256": sha256_file(path),
                          "sourceUrl": source_url_for(relative_path),
                      }
                  )
              manifest = {
                  "schemaVersion": 1,
                  "assetVersion": ASSET_TAG,
                  "platformTarget": platform_target,
                  "files": entries,
              }
              (package_root / "manifest.json").write_text(
                  json.dumps(manifest, indent=2, sort_keys=False) + "\n",
                  encoding="utf-8",
                  newline="\n",
              )

          def package_zip(package_root: Path, archive_path: Path) -> None:
              with zipfile.ZipFile(
                  archive_path,
                  "w",
                  compression=zipfile.ZIP_DEFLATED,
                  compresslevel=9,
              ) as zf:
                  for path in sorted(package_root.rglob("*")):
                      if path.is_file():
                          zf.write(path, path.relative_to(package_root).as_posix())

          def package_tar_gz(package_root: Path, archive_path: Path) -> None:
              with tarfile.open(archive_path, "w:gz") as tf:
                  for path in sorted(package_root.rglob("*")):
                      if path.is_file():
                          tf.add(path, arcname=path.relative_to(package_root).as_posix())

          reset_dir(WORK)
          reset_dir(COMMON)
          reset_dir(UPSTREAM)
          reset_dir(DIST)

          models_dir = COMMON / "models"
          models_dir.mkdir(parents=True, exist_ok=True)
          subprocess.run(
              [
                  sys.executable,
                  "-m",
                  "gdown",
                  "--id",
                  DOCALIGNER_MODEL_ID,
                  "-O",
                  str(models_dir / "docaligner-fastvit_sa24.onnx"),
              ],
              check=True,
          )
          download(DOCALIGNER_LICENSE_URL, models_dir / "LICENSE-docaligner")
          download(UV_DOC_LICENSE_URL, models_dir / "LICENSE-uvdoc")
          download(UV_DOC_CHECKPOINT_URL, UPSTREAM / "uvdoc-best_model.pkl")
          download(UV_DOC_MODEL_PY_URL, UPSTREAM / "model.py")

          sys.path.insert(0, str(UPSTREAM))
          import torch
          from model import UVDocnet

          checkpoint = torch.load(
              UPSTREAM / "uvdoc-best_model.pkl",
              map_location="cpu",
              weights_only=False,
          )
          model = UVDocnet(num_filter=32, kernel_size=5)
          model.load_state_dict(checkpoint["model_state"])
          model.eval()
          dummy = torch.zeros(1, 3, 488, 712, dtype=torch.float32)
          torch.onnx.export(
              model,
              dummy,
              models_dir / "uvdoc-best-model.onnx",
              input_names=["image"],
              output_names=["grid2d", "grid3d"],
              opset_version=16,
          )

          write_text(
              models_dir / "README.md",
              "\n".join(
                  [
                      "# Scanner model assets",
                      "",
                      "docaligner-fastvit_sa24.onnx is copied from the official",
                      "DocAligner fastvit_sa24 Google Drive model source.",
                      "",
                      "uvdoc-best-model.onnx is exported by this workflow from the",
                      "official UVDoc model/best_model.pkl checkpoint and model.py.",
                      "",
                  ]
              ),
          )

          ort_dml_nupkg = UPSTREAM / "microsoft.ml.onnxruntime.directml.1.24.4.nupkg"
          directml_nupkg = UPSTREAM / "microsoft.ai.directml.1.15.4.nupkg"
          linux_ort_tgz = UPSTREAM / "onnxruntime-linux-x64-gpu-1.24.4.tgz"
          download(ORT_DML_NUPKG_URL, ort_dml_nupkg)
          download(DIRECTML_NUPKG_URL, directml_nupkg)
          download(LINUX_ORT_URL, linux_ort_tgz)
          actual_linux_ort_sha = sha256_file(linux_ort_tgz)
          if actual_linux_ort_sha != LINUX_ORT_SHA256:
              raise RuntimeError(
                  "Linux ONNX Runtime archive sha256 mismatch: "
                  f"{actual_linux_ort_sha} != {LINUX_ORT_SHA256}"
              )

          windows_root = WORK / "windows-directml"
          shutil.copytree(COMMON, windows_root)
          windows_ort = windows_root / "onnxruntime" / "windows"
          copy_zip_member(
              ort_dml_nupkg,
              "runtimes/win-x64/native/onnxruntime.dll",
              windows_ort / "onnxruntime.dll",
          )
          copy_zip_member(
              ort_dml_nupkg,
              "runtimes/win-x64/native/onnxruntime_providers_shared.dll",
              windows_ort / "onnxruntime_providers_shared.dll",
          )
          copy_zip_member(
              directml_nupkg,
              "bin/x64-win/DirectML.dll",
              windows_ort / "DirectML.dll",
          )
          copy_zip_member(ort_dml_nupkg, "README.md", windows_ort / "README.md", False)
          copy_zip_member(ort_dml_nupkg, "LICENSE", windows_ort / "LICENSE-onnxruntime", False)
          copy_zip_member(
              ort_dml_nupkg,
              "ThirdPartyNotices.txt",
              windows_ort / "ThirdPartyNotices-onnxruntime.txt",
              False,
          )
          copy_zip_member(directml_nupkg, "LICENSE", windows_ort / "LICENSE-directml", False)
          if not (windows_ort / "README.md").exists():
              write_text(
                  windows_ort / "README.md",
                  "Windows ONNX Runtime DirectML files are extracted from "
                  "Microsoft.ML.OnnxRuntime.DirectML and Microsoft.AI.DirectML NuGet packages.\n",
              )

          linux_extract = UPSTREAM / "linux-ort"
          linux_extract.mkdir(parents=True, exist_ok=True)
          with tarfile.open(linux_ort_tgz, "r:gz") as tf:
              tf.extractall(linux_extract)

          linux_root = WORK / "linux-tensorrt-cuda"
          shutil.copytree(COMMON, linux_root)
          linux_ort = linux_root / "onnxruntime" / "linux"
          for filename in [
              "lib/libonnxruntime.so",
              "lib/libonnxruntime.so.1",
              "lib/libonnxruntime.so.1.24.4",
              "lib/libonnxruntime_providers_shared.so",
              "lib/libonnxruntime_providers_cuda.so",
              "lib/libonnxruntime_providers_tensorrt.so",
          ]:
              copy_extracted_path(linux_extract, filename, linux_ort / Path(filename).name)
          copy_optional_extracted_path(linux_extract, "LICENSE", linux_ort / "LICENSE-onnxruntime")
          copy_optional_extracted_path(
              linux_extract,
              "ThirdPartyNotices.txt",
              linux_ort / "ThirdPartyNotices-onnxruntime.txt",
          )
          copy_optional_extracted_path(linux_extract, "Privacy.md", linux_ort / "Privacy.md")
          copy_optional_extracted_path(linux_extract, "README.md", linux_ort / "README.md")
          if not (linux_ort / "README.md").exists():
              write_text(
                  linux_ort / "README.md",
                  "Linux ONNX Runtime GPU files are extracted from the official "
                  "Microsoft ONNX Runtime v1.24.4 GitHub Release asset.\n",
              )

          write_manifest(windows_root, "windows-directml")
          write_manifest(linux_root, "linux-tensorrt-cuda")

          package_zip(
              windows_root,
              DIST / f"windows-directml-{ASSET_TAG}.zip",
          )
          package_tar_gz(
              linux_root,
              DIST / f"linux-tensorrt-cuda-{ASSET_TAG}.tar.gz",
          )

          with zipfile.ZipFile(DIST / f"windows-directml-{ASSET_TAG}.zip") as zf:
              assert "manifest.json" in zf.namelist()
          with tarfile.open(DIST / f"linux-tensorrt-cuda-{ASSET_TAG}.tar.gz") as tf:
              assert "manifest.json" in tf.getnames()

          print("Built scanner asset packages:")
          for archive in sorted(DIST.iterdir()):
              print(f"- {archive.name} {archive.stat().st_size} bytes")
          PY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.asset_tag }}
          name: Scanner assets ${{ inputs.asset_tag }}
          prerelease: ${{ inputs.prerelease }}
          overwrite_files: true
          files: |
            dist/windows-directml-${{ inputs.asset_tag }}.zip
            dist/linux-tensorrt-cuda-${{ inputs.asset_tag }}.tar.gz
